<!doctype html>
<html lang="en" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div id="main" role="main">
      {% include sidebar.html %}
    
      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
        </div>
      </article>
    </div>

    <!-- {% include scripts.html %} -->
    {% include scripts.html %}

    <!-- Add this for LiveReload in development mode -->
    {% if jekyll.environment == "development" %}
      <script src="http://localhost:35729/livereload.js"></script>
    {% endif %}

    <div style="text-align: center; margin: 2rem 0 1rem;">
      <a href="https://mapmyvisitors.com/web/1c3zo" title="Visit tracker"><img src="https://mapmyvisitors.com/map.png?d=SuLBB0uWDQ2FaU4XHfGdXL_tMrHsTKdZwvRNoRmdMg4&cl=ffffff" alt="Visitor map" style="max-width: 200px; height: auto; opacity: 0.7;"></a>
    </div>
  </body>
</html>
